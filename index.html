/* ═══════════════════════════════════════════
   1. PWA & BACKGROUND CONTROLS
═══════════════════════════════════════════ */

// Register Service Worker for Offline access
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// Media Session API for Lock Screen Controls
function updateMediaSession(track) {
  if ('mediaSession' in navigator && track) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: track.title,
      artist: track.artist || 'Play For You',
      artwork: [
        { src: track.thumb || './icon-512.png', sizes: '512x512', type: 'image/png' }
      ]
    });

    navigator.mediaSession.setActionHandler('play', () => togglePlay());
    navigator.mediaSession.setActionHandler('pause', () => togglePlay());
    navigator.mediaSession.setActionHandler('previoustrack', () => prevTrack());
    navigator.mediaSession.setActionHandler('nexttrack', () => nextTrack());
  }
}

/* ═══════════════════════════════════════════
   2. OFFLINE STORAGE (IndexedDB)
═══════════════════════════════════════════ */
let db;
const DB_NAME = 'playforyou_db';
const STORE_TRACKS = 'tracks';

async function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(STORE_TRACKS, { keyPath: 'id' });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
