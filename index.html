<script>
/* ── NEW FEATURES INTEGRATION ── */

// 1. NOTIFICATION PLAYER & BACKGROUND PLAY (Media Session API)
function registerMS() {
  if ('mediaSession' in navigator && curTrack) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: curTrack.title,
      artist: curTrack.artist,
      album: 'Play For You',
      artwork: [
        { src: curTrack.image || '', sizes: '512x512', type: 'image/png' }
      ]
    });

    navigator.mediaSession.setActionHandler('play', togglePlay);
    navigator.mediaSession.setActionHandler('pause', togglePlay);
    navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
    navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
  }
}

// 2. OFFLINE DOWNLOAD HELPER (Uses Cache API)
async function downloadForOffline(track) {
  if (!('caches' in window)) return;
  try {
    const cache = await caches.open('offline-songs');
    await cache.add(track.url);
    showToast("Downloaded for offline play!");
  } catch (err) {
    showToast("Download failed. Check connection.");
  }
}

// 3. SERVICE WORKER REGISTRATION (For "Act as App" & Offline)
function registerServiceWorker() {
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // You must create a small sw.js file in your root for this to activate
      navigator.serviceWorker.register('/sw.js').then(reg => {
        console.log('SW Registered');
      }).catch(err => console.log('SW Failed', err));
    });
  }
}

/* ═══════════════════════════════════════════
   INIT (Updated to include new features)
═══════════════════════════════════════════ */
loadState();
rehydrateDownloads();
rehydrateHistory();
setGreeting();
buildStatic();
registerMS();
registerServiceWorker(); // Added
history.replaceState({view:'home'},'','#home');

</script>
